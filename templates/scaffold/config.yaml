name: my-seo-project
version: "1.0"
baseUrl: https://example.com
outputDir: ./dist
outputStructure: nested

matrix:
  dimensions:
    product:
      values:
        - CRM Software
        - Project Management Tool
    use_case:
      values:
        - Small Business
        - Enterprise
        - Startups
  pattern:
    url: "best-{{product}}-for-{{use_case}}"
    title: "Best {{product}} for {{use_case}} in 2026"
    description: "Compare top {{product}} options for {{use_case}}. Features, pricing, and reviews."
  filters: []

templates:
  layout: templates/layout.njk
  pages:
    - name: landing
      file: templates/landing-page.njk
      format: nunjucks
      blocks:
        - name: hero
          type: static
        - name: content
          type: static
          template: "<p>Discover the best {{dimensions.product}} solutions designed specifically for {{dimensions.use_case}}.</p>"
        - name: cta
          type: static
          template: "<a href='/contact' class='cta-button'>Get Started Today</a>"

images:
  templates: []
  outputFormats:
    - webp
  quality: 80

ai:
  defaultProvider: openai
  concurrency: 5
  cache: true
  cacheTtlDays: 30
  providers:
    openai:
      model: gpt-4o-mini
      apiKeyEnv: OPENAI_API_KEY

seo:
  siteName: My SEO Project
  schemaTypes:
    - WebPage
    - BreadcrumbList
  internalLinking:
    enabled: true
    maxLinksPerPage: 10
    strategy: shared-dimension

audit:
  uniquenessThreshold: 0.30
  minWordCount: 300
  validateStructuredData: true
